spring.datasource.url=jdbc:postgresql://localhost:5432/aledb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=ale
spring.datasource.password=ale

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JDBC batching
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Static HMAC-SHA-256 key used for searchable hashes (plain UTF-8 string)
encryption.hmac.key=ALE-Static-HMAC-Key-2026-v1-Test

# Disable encryption config requirement during tests
encryption.rsa.public-
encryption.rsa.private-
